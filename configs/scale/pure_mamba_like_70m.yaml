model_name: pure_mamba_like
vocab_size: 50304
max_seq_len: 2048
d_model: 512
n_layers: 12
n_heads: 8
n_kv_heads: 8
d_ff: 2048
dropout: 0.0
rope_base: 10000
tie_embeddings: true
mixer_backend: auto
use_dynamic_hourglass_compression: false
use_anchor_preserved_local_global: false
use_attention_islands: false
use_curriculum_mtp: false
compression:
  enabled: false
mtp:
  enabled: false
train:
  seed: 17
  batch_size: 8
  seq_len: 2048
  steps: 100000
  lr: 0.0003
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  warmup_steps: 1000
  cosine_decay: true
  device: auto
  dtype: auto
  output_dir: runs/scale_pure_mamba_like_70m

