model_name: pure_mamba_like
vocab_size: 32768
max_seq_len: 2048
d_model: 384
n_layers: 10
n_heads: 6
n_kv_heads: 6
d_ff: 1536
dropout: 0.0
rope_base: 10000
tie_embeddings: true
mixer_backend: auto
use_dynamic_hourglass_compression: false
use_anchor_preserved_local_global: false
use_attention_islands: false
use_curriculum_mtp: true
compression:
  enabled: false
  recon_loss_weight: 0.0
mtp:
  enabled: true
  max_horizon: 4
  enabled_horizons: [2, 3, 4]
  horizon_weights: {2: 0.10, 3: 0.06, 4: 0.04}
  start_step: 1000
  horizon2_step: 1000
  horizon3_step: 3000
  horizon4_step: 6000
  ramp_steps: 5000
train:
  seed: 17
  batch_size: 8
  seq_len: 2048
  steps: 200000
  lr: 0.0004
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  gradient_accumulation_steps: 4
  warmup_steps: 1000
  cosine_decay: true
  device: auto
  dtype: auto
  log_every: 10
  eval_every: 500
  save_every: 1000
  output_dir: runs/pure_mamba_like_agentcoder_50m
eval:
  eval_batches: 20
  probe_lengths: [512, 1024, 2048]
  long_context_lengths: [2048, 4096]
