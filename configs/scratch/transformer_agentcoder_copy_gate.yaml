model_name: transformer
vocab_size: 1536
max_seq_len: 256
d_model: 128
n_layers: 4
n_heads: 4
n_kv_heads: 4
d_ff: 512
dropout: 0.0
rope_base: 10000
tie_embeddings: true
mixer_backend: fallback
attention_island_layers: []
use_mamba_or_fallback_backbone: false
use_dynamic_hourglass_compression: false
use_anchor_preserved_local_global: false
use_attention_islands: false
use_curriculum_mtp: false
compression:
  enabled: false
  block_size: 8
  anchors_per_block: 0
  pooled_chunks_per_block: 1
  delayed_chunk_context: true
  recon_loss_weight: 0.0
mtp:
  enabled: false
  max_horizon: 4
  enabled_horizons: []
  horizon_weights: {}
  start_step: 100000000
  horizon2_step: 100000000
  horizon3_step: 100000000
  horizon4_step: 100000000
  ramp_steps: 1000
train:
  seed: 17
  batch_size: 8
  seq_len: 192
  steps: 2600
  lr: 0.001
  weight_decay: 0.0
  betas: [0.9, 0.95]
  grad_clip: 1.0
  gradient_accumulation_steps: 1
  warmup_steps: 25
  cosine_decay: false
  device: auto
  dtype: auto
  log_every: 25
  eval_every: 100
  save_every: 0
  output_dir: runs/agentcoder_copy_gate/transformer/train
eval:
  eval_batches: 4
  probe_lengths: [64, 128, 192]
  long_context_lengths: [256]
